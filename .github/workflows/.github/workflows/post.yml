name: Amazon Deals Auto Post

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install requirements
        run: |
          pip install -r requirements.txt

      - name: Run bot
        run: |
          python main.py
